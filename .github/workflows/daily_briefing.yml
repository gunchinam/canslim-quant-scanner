name: Daily Stock Briefing

on:
  schedule:
    - cron: '30 23 * * 0-4'  # KST 08:30 평일 아침 (UTC 전날 23:30)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show requirements
        run: cat briefing/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r briefing/requirements.txt

      - name: Run briefing
        run: python briefing/briefing.py now
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
