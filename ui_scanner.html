<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light">
<title>QUANT NEXUS — 종목 스캐너</title>
<style>
:root {
  --brand: #721FE5;
  --primary: #030213;
  --background: #ffffff;
  --card: #ffffff;
  --surface-page: #FAFAFA;
  --surface-subtle: #F4F4F6;
  --surface-muted: #E8E6E1;
  --brand-tint: #F0E8FF;
  --alert-badge: #FF4444;
  --text-primary: #3C3C3C;
  --text-secondary: #6A6A6A;
  --text-tertiary: #7A7A7A;
  --text-disabled: #9B9B9B;
  --icon-default: #4A5568;
  --border: rgba(0,0,0,0.09);
  --destructive: #D4183D;
  --success: #22A355;
  --warning: #D97706;
  --info: #3B82F6;
  --radius: 0.625rem;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-elevated: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-modal: 0 8px 24px rgba(0,0,0,0.12);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  background: var(--surface-page);
  font-family: -apple-system, 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

.shell {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--surface-page);
  position: relative;
}

/* TopBar */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 60px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  box-shadow: var(--shadow-card);
}

.topbar-logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text-primary);
}

.topbar-logo span {
  color: var(--brand);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-date {
  font-size: 12px;
  color: var(--text-tertiary);
}

.icon-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--icon-default);
  position: relative;
}

.icon-btn:hover {
  background: var(--surface-subtle);
}

.notif-dot {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 7px;
  height: 7px;
  background: var(--alert-badge);
  border-radius: 50%;
  border: 1.5px solid #fff;
}

/* Scroll content area */
.scroll-content {
  padding-bottom: 84px;
}

/* Search */
.search-wrap {
  padding: 16px 24px 0;
}

.search-box {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
}

.search-box svg {
  flex-shrink: 0;
  color: var(--text-tertiary);
}

.search-input {
  border: none;
  outline: none;
  background: transparent;
  font-size: 14px;
  color: var(--text-primary);
  width: 100%;
  font-family: inherit;
}

.search-input::placeholder {
  color: var(--text-disabled);
}

/* Filter chips */
.filter-wrap {
  padding: 16px 0 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.filter-wrap::-webkit-scrollbar { display: none; }

.filter-list {
  display: flex;
  gap: 8px;
  padding: 0 24px;
  white-space: nowrap;
}

.chip {
  display: inline-flex;
  align-items: center;
  height: 34px;
  padding: 0 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.chip.active {
  background: var(--brand-tint);
  border-color: var(--brand);
  color: var(--brand);
  font-weight: 600;
}

/* Summary card */
.section-pad {
  padding: 16px 24px 0;
}

.summary-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  overflow: hidden;
}

.summary-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 8px;
  gap: 4px;
}

.summary-divider {
  width: 1px;
  background: var(--border);
  margin: 12px 0;
}

.summary-label {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.summary-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}

.summary-value .unit {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-left: 1px;
}

/* Section header */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 12px;
}

.section-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
}

.filter-btn {
  font-size: 13px;
  font-weight: 600;
  color: var(--brand);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  min-height: 44px;
  display: flex;
  align-items: center;
}

/* Stock list */
.stock-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 0 24px;
}

.stock-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: box-shadow 0.15s, transform 0.1s;
  min-height: 72px;
}

.stock-card:active {
  transform: scale(0.99);
  box-shadow: var(--shadow-elevated);
}

.rank-badge {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

.rank-1 { background: #FFF3CD; color: #B8860B; }
.rank-2 { background: #F0F0F0; color: #666; }
.rank-3 { background: #FDEBD0; color: #B5541D; }
.rank-other { background: var(--surface-subtle); color: var(--text-tertiary); }

.stock-info {
  flex: 1;
  min-width: 0;
}

.stock-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}

.stock-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 120px;
}

.sector-badge {
  display: inline-flex;
  align-items: center;
  height: 18px;
  padding: 0 7px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 600;
  background: var(--surface-subtle);
  color: var(--text-secondary);
  flex-shrink: 0;
}

.stock-code {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}

.score-bar-wrap {
  height: 4px;
  background: var(--surface-subtle);
  border-radius: 2px;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  background: var(--brand);
  border-radius: 2px;
  transition: width 0.3s ease;
}

.stock-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
  flex-shrink: 0;
}

.stock-score {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
}

.stock-grade {
  font-size: 10px;
  font-weight: 700;
  color: var(--brand);
  text-transform: uppercase;
}

.stock-change {
  font-size: 12px;
  font-weight: 600;
}

.stock-change.up { color: var(--destructive); }
.stock-change.down { color: var(--info); }

.chevron-icon {
  color: var(--text-disabled);
  flex-shrink: 0;
  margin-left: 2px;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  height: 68px;
  background: var(--card);
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 16px;
  z-index: 200;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  min-height: 44px;
  justify-content: center;
  border: none;
  background: none;
  color: var(--text-tertiary);
  font-size: 11px;
  font-family: inherit;
  font-weight: 500;
}

.nav-item.active {
  color: var(--brand);
}

.nav-fab {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--brand);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-elevated);
  border: none;
  cursor: pointer;
  color: #fff;
  margin-bottom: 14px;
}

.safe-bottom {
  height: env(safe-area-inset-bottom, 0px);
}
</style>
</head>
<body>
<div class="shell">
  <!-- TopBar -->
  <header class="topbar">
    <div class="topbar-logo">QUANT <span>NEXUS</span></div>
    <div class="topbar-right">
      <span class="topbar-date">2026.05.10</span>
      <button class="icon-btn" aria-label="알림">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="notif-dot"></span>
      </button>
    </div>
  </header>

  <div class="scroll-content">
    <!-- Search -->
    <div class="search-wrap">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" color="var(--text-tertiary)">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" type="text" placeholder="종목명 또는 코드 검색..." aria-label="종목 검색">
      </div>
    </div>

    <!-- Filter chips -->
    <div class="filter-wrap" role="tablist" aria-label="섹터 필터">
      <div class="filter-list">
        <button class="chip active" role="tab" aria-selected="true" onclick="selectChip(this)">전체 ★</button>
        <button class="chip" role="tab" aria-selected="false" onclick="selectChip(this)">반도체</button>
        <button class="chip" role="tab" aria-selected="false" onclick="selectChip(this)">2차전지</button>
        <button class="chip" role="tab" aria-selected="false" onclick="selectChip(this)">바이오</button>
        <button class="chip" role="tab" aria-selected="false" onclick="selectChip(this)">금융</button>
        <button class="chip" role="tab" aria-selected="false" onclick="selectChip(this)">자동차</button>
        <button class="chip" role="tab" aria-selected="false" onclick="selectChip(this)">IT</button>
      </div>
    </div>

    <!-- Summary -->
    <div class="section-pad">
      <div class="summary-card">
        <div class="summary-item">
          <span class="summary-label">스캔 종목</span>
          <span class="summary-value">237<span class="unit">개</span></span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-item">
          <span class="summary-label">평균 점수</span>
          <span class="summary-value">67<span class="unit">점</span></span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-item">
          <span class="summary-label">상승 비율</span>
          <span class="summary-value">61<span class="unit">%</span></span>
        </div>
      </div>
    </div>

    <!-- Section header -->
    <div class="section-header">
      <h2 class="section-title">스캔 결과</h2>
      <button class="filter-btn" aria-label="정렬 및 필터">필터 ▾</button>
    </div>

    <!-- Stock list -->
    <div class="stock-list" id="stockList"></div>

    <div style="height:24px;"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" aria-label="메인 메뉴">
    <button class="nav-item active" aria-label="홈" aria-current="page">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      홈
    </button>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;">
      <button class="nav-fab" aria-label="스캔 실행">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
    <button class="nav-item" aria-label="관심 종목">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      관심
    </button>
  </nav>
</div>

<script>
const stocks = [
  { rank:1,  name:'삼성전자',       code:'005930', sector:'반도체', score:87, grade:'A',  change:'+3.2%', up:true  },
  { rank:2,  name:'SK하이닉스',     code:'000660', sector:'반도체', score:84, grade:'A',  change:'+5.1%', up:true  },
  { rank:3,  name:'NAVER',          code:'035420', sector:'IT',    score:81, grade:'A',  change:'+1.8%', up:true  },
  { rank:4,  name:'LG에너지솔루션', code:'373220', sector:'2차전지',score:79, grade:'B+', change:'+2.4%', up:true  },
  { rank:5,  name:'현대차',         code:'005380', sector:'자동차', score:76, grade:'B+', change:'+0.9%', up:true  },
  { rank:6,  name:'삼성바이오로직스',code:'207940', sector:'바이오', score:74, grade:'B',  change:'-0.4%', up:false },
  { rank:7,  name:'셀트리온',       code:'068270', sector:'바이오', score:71, grade:'B',  change:'-1.2%', up:false },
  { rank:8,  name:'포스코홀딩스',   code:'005490', sector:'철강',  score:69, grade:'B',  change:'+0.6%', up:true  },
  { rank:9,  name:'KB금융',         code:'105560', sector:'금융',  score:66, grade:'B-', change:'+0.3%', up:true  },
  { rank:10, name:'카카오',         code:'035720', sector:'IT',    score:63, grade:'C+', change:'-2.1%', up:false },
];

function getRankClass(rank) {
  if (rank === 1) return 'rank-1';
  if (rank === 2) return 'rank-2';
  if (rank === 3) return 'rank-3';
  return 'rank-other';
}

function renderStocks(list) {
  const container = document.getElementById('stockList');
  container.innerHTML = '';
  list.forEach(s => {
    const card = document.createElement('a');
    card.href = 'ui_detail.html';
    card.className = 'stock-card';
    card.setAttribute('aria-label', `${s.rank}위 ${s.name} 점수 ${s.score}점`);
    card.innerHTML = `
      <div class="rank-badge ${getRankClass(s.rank)}">${s.rank}</div>
      <div class="stock-info">
        <div class="stock-top">
          <span class="stock-name">${s.name}</span>
          <span class="sector-badge">${s.sector}</span>
        </div>
        <div class="stock-code">${s.code}</div>
        <div class="score-bar-wrap">
          <div class="score-bar-fill" style="width:${s.score}%"></div>
        </div>
      </div>
      <div class="stock-right">
        <span class="stock-score">${s.score}</span>
        <span class="stock-grade">${s.grade}</span>
        <span class="stock-change ${s.up ? 'up' : 'down'}">${s.change}</span>
      </div>
      <svg class="chevron-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    `;
    container.appendChild(card);
  });
}

function selectChip(el) {
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.remove('active');
    c.setAttribute('aria-selected', 'false');
  });
  el.classList.add('active');
  el.setAttribute('aria-selected', 'true');

  const label = el.textContent.trim();
  const sectorMap = {
    '전체 ★': null,
    '반도체': '반도체',
    '2차전지': '2차전지',
    '바이오': '바이오',
    '금융': '금융',
    '자동차': '자동차',
    'IT': 'IT',
  };
  const sector = sectorMap[label];
  const filtered = sector ? stocks.filter(s => s.sector === sector) : stocks;
  renderStocks(filtered);
}

renderStocks(stocks);
</script>
</body>
</html>
